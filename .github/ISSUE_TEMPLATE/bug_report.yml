name: Bug Report
description: Report something that is not working correctly
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        A clear description of the bug.

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How to reproduce the bug (be specific)"
      placeholder: |
        1. Run `upload myfile.txt`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Linux
        - macOS
        - Windows (PowerShell)
        - Windows (WSL)
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: "Cloud Provider"
      options:
        - AWS S3
        - Alibaba Cloud OSS
        - Tencent Cloud COS
        - Baidu Cloud BOS
        - Huawei Cloud OBS
        - Google Cloud GCS
        - Azure Blob Storage
        - MinIO
        - Other

  - type: textarea
    id: logs
    attributes:
      label: "Error Output / Logs"
      description: "Paste the error message or log output"
      placeholder: |
        # Run with bash -x or PowerShell -Debug for debug output
        bash -x upload myfile.txt 2>&1 | head -50
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues"
          required: true
        - label: "I have verified the issue exists with the latest version"
          required: true
        - label: "I am using official CLI / SDK tools (not curl fallback)"
          required: false
